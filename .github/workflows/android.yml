name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master", "dev", "release/*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create .env from .env.example
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            echo "No .env.example found, creating empty .env"
            touch .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found!"
          fi

      - name: Grant Execute Permission to Gradlew
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Run Room KSP Schema & Unit Tests
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew testDebugUnitTest
          else
            gradle testDebugUnitTest
          fi

      - name: Build Debug APK
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
